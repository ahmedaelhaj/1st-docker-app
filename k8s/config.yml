apiVersion: v1
kind: Secret
metadata:
  name: db-secret
type: Opaque
stringData:
  postgres-password: "your_secure_password" # Replaces ${POSTGRES_PASSWORD}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  POSTGRES_USER: "postgres_user"           # Replaces ${POSTGRES_USER}
  POSTGRES_DB: "ticket_db"                 # Replaces ${POSTGRES_DB}
